services:
  mosquitto:
    image: eclipse-mosquitto:latest
    container_name: emergency-mosquitto
    ports:
      - "1883:1883"
    volumes:
      - ./mqtt-broker/mosquitto.conf:/mosquitto/config/mosquitto.conf
    restart: unless-stopped
    networks:
      - emergency-network
  emergency-wldt-subsystem:
    build:
      context: ./emergency-wldt-subsystem
    container_name: emergency-wldt-subsystem
    ports:
      - "8080:8080"
    environment:
      - MQTT_BROKER_URL=tcp://mosquitto:1883
    depends_on:
      - mosquitto
    restart: unless-stopped
    networks:
      - emergency-network

networks:
  emergency-network:
    driver: bridge