services:
  mosquitto:
    image: eclipse-mosquitto:latest
    container_name: preh-mosquitto
    ports:
      - "1883:1883"
    volumes:
      - ./mqtt-broker/mosquitto.conf:/mosquitto/config/mosquitto.conf
    restart: unless-stopped
    networks:
      - preh-network

networks:
  preh-network:
    driver: bridge